<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Earthquake Coordinate Picker (Desktop Only)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden; 
            background: radial-gradient(circle at center, #1e272e 0%, #0f141c 100%);
            color: #e1e8ed;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(52, 152, 219, 0.05) 1px, transparent 1px),
                radial-gradient(circle, rgba(231, 76, 60, 0.02) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .app-container {
            display: flex;
            width: 98vw;
            height: 94vh;
            background: rgba(26, 36, 43, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 24%;
            min-width: 310px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(145deg, rgba(30,41,51,0.9) 0%, rgba(19,26,33,0.9) 100%);
            box-sizing: border-box;
        }

        .map-area {
            width: 76%;
            height: 100%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .clock-card {
            background: rgba(15, 23, 30, 0.8);
            border: 1px solid rgba(52, 152, 219, 0.3);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        #current-datetime {
            font-size: 1.15em;
            font-weight: bold;
            color: #00ebff; 
            text-shadow: 0 0 10px rgba(0, 235, 255, 0.5);
            font-family: 'Courier New', Courier, monospace;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.3em;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .instruction {
            font-size: 0.82em;
            color: #9aa0a6;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .result-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.78em;
            color: #3498db;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* ไฮไลท์สีแยกกลุ่มละติจูด/ลองจิจูดให้สังเกตง่ายขึ้น */
        .group-lat label { color: #ffbe0b; }
        .group-lng label { color: #00ebff; }

        .input-wrapper {
            display: flex;
            gap: 6px;
        }

        .input-wrapper input {
            flex-grow: 1;
            background: rgba(15, 23, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px;
            border-radius: 6px;
            color: #fff;
            font-size: 1.05em;
            font-weight: 600;
            font-family: monospace;
            transition: all 0.3s;
            text-align: center;
            width: 65%;
        }

        .input-wrapper input:not(:placeholder-shown) {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .btn-copy {
            background: #34495e;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 0 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: #2980b9;
            border-color: #3498db;
        }
        
        .btn-copy:active {
            transform: scale(0.95);
        }

        .footer-brand {
            margin-top: 15px;
            font-size: 0.72em;
            color: #55606d;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
        }

        /* ปุ่มเครื่องมือตีกรอบสี่เหลี่ยมสีส้มเด่นชัด */
        .leaflet-draw-toolbar-top {
            border: 2px solid #ff9f43 !important;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.6);
        }
        .leaflet-draw-toolbar a {
            background-color: #ff9f43 !important;
            color: #000 !important;
        }
        .leaflet-draw-toolbar a:hover {
            background-color: #ffb167 !important;
        }
        .leaflet-draw-actions a {
            background-color: #e74c3c !important;
            color: #fff !important;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="sidebar">
        <div>
            <div class="clock-card">
                <div id="current-datetime">กำลังซิงค์เวลา...</div>
            </div>

            <a href="index.html" style="text-decoration: none; display: inline-block; margin-bottom: 10px;">
                <button style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #9aa0a6; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8em; transition: 0.2s;">
                    ← กลับหน้าหลัก SeismoThai
                </button>
            </a>

            <h2>TMD BOUNDING BOX</h2>
            <p class="instruction">
                ลำดับช่องเรียงตามหน้าเว็บค้นหาของกรมอุตุฯ (TMD) เรียบร้อยแล้ว สามารถกด Copy แล้วสลับไปวางเรียงตามลำดับได้เลยครับ
            </p>
        </div>

        <div class="result-box">
            
            <div class="input-group group-lat">
                <label>1️⃣ Latitude จาก (ใต้สุด / Min)</label>
                <div class="input-wrapper">
                    <input type="text" id="lat-min" readonly placeholder="-">
                    <button class="btn-copy" onclick="copyValue('lat-min')">Copy</button>
                </div>
            </div>
            <div class="input-group group-lat">
                <label>2️⃣ Latitude ถึง (เหนือสุด / Max)</label>
                <div class="input-wrapper">
                    <input type="text" id="lat-max" readonly placeholder="-">
                    <button class="btn-copy" onclick="copyValue('lat-max')">Copy</button>
                </div>
            </div>

            <div class="input-group group-lng">
                <label>3️⃣ Longitude จาก (ตะวันตกสุด / Min)</label>
                <div class="input-wrapper">
                    <input type="text" id="lng-min" readonly placeholder="-">
                    <button class="btn-copy" onclick="copyValue('lng-min')">Copy</button>
                </div>
            </div>
            <div class="input-group group-lng">
                <label>4️⃣ Longitude ถึง (ตะวันออกสุด / Max)</label>
                <div class="input-wrapper">
                    <input type="text" id="lng-max" readonly placeholder="-">
                    <button class="btn-copy" onclick="copyValue('lng-max')">Copy</button>
                </div>
            </div>
            
        </div>

        <div class="footer-brand">
            Earthquake Mapping System • Desktop
        </div>
    </div>

    <div class="map-area">
        <div id="map"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script>
    function updateLiveClock() {
        const now = new Date();
        const options = { 
            timeZone: 'Asia/Bangkok',
            weekday: 'short', 
            year: 'numeric', 
            month: 'short', 
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        };
        const formatter = new Intl.DateTimeFormat('th-TH', options);
        document.getElementById('current-datetime').innerText = formatter.format(now);
    }
    setInterval(updateLiveClock, 1000);
    updateLiveClock();

    function copyValue(inputId) {
        const inputElement = document.getElementById(inputId);
        if (inputElement.value && inputElement.value !== '-') {
            navigator.clipboard.writeText(inputElement.value).then(() => {
                const btn = inputElement.nextElementSibling;
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.background = '#2ecc71';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = '#34495e';
                }, 1200);
            });
        }
    }

    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        attribution: '© Google Maps'
    });

    var darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© CartoDB'
    });

    var map = L.map('map', {
        center: [17.5, 99.5], 
        zoom: 6,
        layers: [googleHybrid] 
    });

    var baseMaps = {
        "Google Hybrid (ดาวเทียมคมชัด)": googleHybrid,
        "Dark Mode Map (เน้นวิเคราะห์พิกัด)": darkMap
    };
    L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    var drawControl = new L.Control.Draw({
        draw: {
            polyline: false,
            polygon: false,
            circle: false,
            marker: false,
            circlemarker: false,
            rectangle: {
                shapeOptions: {
                    color: '#ff9f43', 
                    weight: 2,
                    opacity: 0.8,
                    fillColor: '#ff9f43',
                    fillOpacity: 0.15
                }
            }
        },
        edit: {
            featureGroup: drawnItems,
            remove: true
        }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.clearLayers();
        var layer = e.layer;
        drawnItems.addLayer(layer);

        var bounds = layer.getBounds();
        var northEast = bounds.getNorthEast(); 
        var southWest = bounds.getSouthWest(); 

        // บันทึกค่าลงอินพุตตามไอดีที่ถูกต้อง
        document.getElementById('lat-max').value = northEast.lat.toFixed(5);
        document.getElementById('lng-max').value = northEast.lng.toFixed(5);
        document.getElementById('lat-min').value = southWest.lat.toFixed(5);
        document.getElementById('lng-min').value = southWest.lng.toFixed(5);
    });

    map.on(L.Draw.Event.DELETED, function () {
        document.getElementById('lat-max').value = '';
        document.getElementById('lng-max').value = '';
        document.getElementById('lat-min').value = '';
        document.getElementById('lng-min').value = '';
    });
</script>

</body>
</html>
